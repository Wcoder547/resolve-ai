services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: resolveai_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: resolveai_redis_prod
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  caddy:
    image: caddy:2-alpine
    container_name: resolveai_caddy_prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy

  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    container_name: resolveai_ai_service_prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      SERVICE_NAME: ${SERVICE_NAME}
      API_VERSION: ${API_VERSION}
      CORS_ORIGIN: ${CORS_ORIGIN}
      LLM_PROVIDER: ${LLM_PROVIDER}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL}
      REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS}
      ENABLE_METRICS: ${ENABLE_METRICS}
      METRICS_TOKEN: ${METRICS_TOKEN}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/live"]
      interval: 15s
      timeout: 5s
      retries: 10

  api-migrate:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: resolveai_api_migrate_prod
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
    command: ["pnpm", "prisma", "migrate", "deploy"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: resolveai_api_prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      AI_SERVICE_URL: ${AI_SERVICE_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
    ports:
      - "${API_PORT}:5000"
    volumes:
      - api_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      api-migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:5000/live').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  knowledge-worker:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: resolveai_knowledge_worker_prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      AI_SERVICE_URL: ${AI_SERVICE_URL}
    command: ["node", "dist/workers/knowledge-ingestion.worker.js"]
    volumes:
      - api_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      api-migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
  redis_data:
  api_uploads:
  caddy_data:
  caddy_config:

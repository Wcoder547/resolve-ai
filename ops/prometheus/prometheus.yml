global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: resolveai-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:5000

  - job_name: resolveai-ai-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - ai-service:8000
